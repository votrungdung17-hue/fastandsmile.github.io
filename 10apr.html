<!DOCTYPE html>
<!-- saved from url=(0039)file:///G:/My%20Drive/database/fm1.html -->
<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Flight Manager</title>
<style>
body { font-family: Arial; }
input { margin:3px; padding:3px; }
table { border-collapse: collapse; margin-top:20px; width:100%; }
td, th { border:1px solid #ccc; padding:5px; text-align:center; }
th { background:#eee; }
button { margin:2px; cursor:pointer; }
tr.editing { background:#fff3cd; }
input.uppercase { text-transform: uppercase; }

/* Blink & Solid Styles */
.blink-red { animation: blinkRed 3s infinite; }
@keyframes blinkRed { 0% { background:red;color:#fff;} 50% { background:transparent;color:red;} 100% {background:red;color:#fff;} }
.blink-green { animation: blinkGreen 1s infinite; }
@keyframes blinkGreen { 0% { background:#28a745;color:#fff;} 50% { background:transparent;color:#28a745;} 100% { background:#28a745;color:#fff;} }
.solid-green { background-color:#28a745;color:#fff; }
.solid-gold { background-color:gold;color:#000; }
.blink-gold { animation: blinkGold 1.5s infinite; }
@keyframes blinkGold { 0%{background:#FFD700;color:#000;}50%{background:transparent;color:#FFD700;}100%{background:#FFD700;color:#000;} }
</style>
</head>
<body>

<h2>Nhập chuyến bay</h2>
<form id="form">
  <!-- Thông tin chung -->
  <fieldset>
    <legend>Thông tin chung</legend>
    <label for="ngay">Ngày</label>
    <input id="ngay" type="date" required>

    <label for="soHieu">Số hiệu chuyến bay</label>
    <input id="soHieu" class="uppercase" required>

    <label for="soDangKy">Số đăng ký</label>
    <input id="soDangKy" class="uppercase" required>
  </fieldset>

  <!-- Arrival -->
  <fieldset>
    <legend>Giờ đến (Arrival)</legend>
    <label for="sta">STA</label>
    <input id="sta" type="text" placeholder="HH:MM" pattern="[0-2][0-9]:[0-5][0-9]">

    <label for="eta">ETA</label>
    <input id="eta" type="text" placeholder="HH:MM" pattern="[0-2][0-9]:[0-5][0-9]">

    <label for="ata">ATA</label>
    <input id="ata" type="text" placeholder="HH:MM" pattern="[0-2][0-9]:[0-5][0-9]">
  </fieldset>

  <!-- Departure -->
  <fieldset>
    <legend>Giờ đi (Departure)</legend>
    <label for="std">STD</label>
    <input id="std" type="text" placeholder="HH:MM" pattern="[0-2][0-9]:[0-5][0-9]">

    <label for="etd">ETD</label>
    <input id="etd" type="text" placeholder="HH:MM" pattern="[0-2][0-9]:[0-5][0-9]">

    <label for="atd">ATD</label>
    <input id="atd" type="text" placeholder="HH:MM" pattern="[0-2][0-9]:[0-5][0-9]">
  </fieldset>

  <!-- Khác -->
  <fieldset>
    <legend>Khác</legend>
    <label for="fht">FHT</label>
    <input id="fht" type="text" placeholder="HH:MM" pattern="[0-2][0-9]:[0-5][0-9]">

    <label for="pushback">Pushback</label>
    <input id="pushback" type="text" placeholder="HH:MM" pattern="[0-2][0-9]:[0-5][0-9]">

    <label for="delay">Delay</label>
    <input id="delay" type="text" placeholder="HH:MM" pattern="[0-2][0-9]:[0-5][0-9]">
  </fieldset>

  <button type="submit">➕ Thêm</button>
</form>

<h2>Bảng chuyến bay</h2>

<table id="table"></table>

<script>
const API = "https://script.google.com/macros/s/AKfycbzRPO1gtnCDab5n5dOY9jSGF_lnCLtQrlwn1ShYmRNm7kg5uWn_sfMKR0SeZvPnXCt52A/exec"; // Thay bằng link deploy mới

function formatDateForInput(iso) {
  if(!iso) return "";
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatTimeForInput(val){
  if(!val) return "";

  // ✅ Nếu đã là dạng HH:mm thì giữ nguyên (QUAN TRỌNG)
  if (typeof val === "string" && /^\d{2}:\d{2}$/.test(val)) {
    return val;
  }

  // ✅ Nếu là ISO (có T hoặc Z) thì mới parse Date
  if (typeof val === "string" && val.includes("T")) {
    const d = new Date(val);
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  return "";
}

function applyBlinkEffect(cellElement, planned, actual){
  cellElement.classList.remove("blink-red","blink-green","solid-green","blink-gold");
  if(planned && actual){
    if(actual > planned) cellElement.classList.add("blink-red");
    else cellElement.classList.add("solid-green");
  } else {
    cellElement.classList.add("blink-gold");
  }
}

function parseTime(str){
  if(!str) return null;
  const [h,m] = str.split(":").map(Number);
  return h*60 + m; // tổng số phút
}

function formatMinutes(total){
  if(total==null) return "";
  const h = String(Math.floor(total/60)).padStart(2,"0");
  const m = String(total%60).padStart(2,"0");
  return `${h}:${m}`;
}

function loadData(){
  fetch(API+"?t="+Date.now(), {cache:"no-store"})
    .then(r=>r.json())
    .then(res=>{
      const data = res.data;
      if(!data || data.length===0) return;

      // Header
      let html = "<tr>";
      data[0].forEach((col,i)=>{ if(i!==0) html+=`<th>${col}</th>`; });
      html += "<th>Hành động</th></tr>";

      // Rows
      data.slice(1).reverse().forEach(row=>{
        html += `<tr id="row-${row[0]}">`;
        row.forEach((cell,i)=>{
          if(i===0) return;
          if(i===1) cell = formatDateForInput(cell);      // ngày
          if([4,5,6,7,8,9,10,11].includes(i)) cell = formatTimeForInput(cell); // giờ

    // ép chữ hoa cho số hiệu (i=2) và số đăng ký (i=3)
          if(i===2 || i===3){
            cell = (cell || "").toUpperCase();
          }

          // Nếu là cột Delay (index 12) thì tính toán
          if(i===12){
            const pushback = row[11] ? formatTimeForInput(row[11]) : "";
            const atd = row[9] ? formatTimeForInput(row[9]) : "";
            let delay = "";
            if(pushback && atd){
              const pbMin = parseTime(pushback);
              const atdMin = parseTime(atd);
              const diff = pbMin - atdMin;
              if(diff >= 0) delay = formatMinutes(diff);
            }
            cell = delay;
          }

          html += `<td>${cell || ''}</td>`;
        });
        html += `<td>
          <button onclick='editRow(${JSON.stringify(row)})'>✏️</button>
          <button onclick='deleteRow(${row[0]})'>🗑</button>
        </td></tr>`;
      });

      document.getElementById("table").innerHTML = html;

      // Hiệu ứng màu
      data.slice(1).reverse().forEach(row=>{
        const tr = document.getElementById("row-"+row[0]);
        if(!tr) return;
        const cells = tr.querySelectorAll("td");
        const eta = row[5]?new Date(row[5]):null;
        const ata = row[6]?new Date(row[6]):null;
        const etd = row[8]?new Date(row[8]):null;
        const atd = row[9]?new Date(row[9]):null;
        const sta = row[4]?new Date(row[4]):null;
        const std = row[7]?new Date(row[7]):null;

        applyBlinkEffect(cells[5], eta, ata);
        applyBlinkEffect(cells[8], etd, atd);

        if(sta && eta) cells[4].classList.add(sta.getTime()!==eta.getTime()?"blink-gold":"solid-green");
        if(std && etd) cells[7].classList.add(std.getTime()!==etd.getTime()?"blink-gold":"solid-green");
      });
    });
}


// CREATE
form.onsubmit = function(e){
  e.preventDefault();
  const data = {
    ngay: ngay.value,
    soHieu: soHieu.value,
    soDangKy: soDangKy.value,
    sta: sta.value,
    eta: eta.value,
    ata: ata.value,
    std: std.value,
    etd: etd.value,
    atd: atd.value,
    fht: fht.value,
    pushback: pushback.value,
    delay: delay.value,
    action:"create"
  };
  fetch(API,{method:"POST",body:JSON.stringify(data)})
    .then(r=>r.json())
    .then(resp=>{
      if(resp.status==="created"){ form.reset(); loadData(); }
      else alert("Thêm thất bại: "+(resp.error||""));
    });
};

function editRow(row){
  const tr = document.getElementById("row-"+row[0]);
  tr.classList.add("editing");
  let html="";
  row.forEach((cell,i)=>{
    if(i===0) return;
    if(i===1) cell=formatDateForInput(cell);
    if([4,5,6,7,8,9,10,11,12].includes(i)) cell=formatTimeForInput(cell);

    if(i===1){
      html += `<td><input type="date" value="${cell||''}"></td>`;
    } else if([4,5,6,7,8,9,10,11,12].includes(i)){
      // ép nhập giờ theo HH:mm
      html += `<td><input type="text" value="${cell||''}" pattern="[0-2][0-9]:[0-5][0-9]" placeholder="HH:mm"></td>`;
    } else {
      html += `<td><input type="text" value="${cell||''}"></td>`;
    }
  });
  html += `<td>
    <button onclick='saveRow(${row[0]}, this)'>💾</button>
    <button onclick='loadData()'>❌</button>
  </td>`;
  tr.innerHTML = html;

  tr.querySelectorAll(".uppercase").forEach(input=>{
    input.addEventListener('input', e=>{
      e.target.value = e.target.value.toUpperCase();
    });
  });
}

// SAVE
function saveRow(id, btn){
  const tr = btn.closest("tr");
  const inputs = tr.querySelectorAll("input");
  const data = {
    id: id,
    ngay: inputs[0].value,
    soHieu: inputs[1].value,
    soDangKy: inputs[2].value,
    sta: inputs[3].value,
    eta: inputs[4].value,
    ata: inputs[5].value,
    std: inputs[6].value,
    etd: inputs[7].value,
    atd: inputs[8].value,
    fht: inputs[9].value,
    pushback: inputs[10].value,
    delay: inputs[11].value,
    action:"update"
  };

  fetch(API,{method:"POST",body:JSON.stringify(data)})
    .then(r=>r.json())
    .then(resp=>{
      if(resp.status==="updated") loadData();
      else alert("Cập nhật thất bại: "+(resp.error||""));
    });
}

// DELETE
function deleteRow(id){
  if(!confirm("Xóa dòng này?")) return;
  fetch(API,{method:"POST",body:JSON.stringify({id:id,action:"delete"})})
    .then(r=>r.json())
    .then(resp=>{
      if(resp.status==="deleted") loadData();
      else alert("Xóa thất bại: "+(resp.error||""));
    });
}

// INIT
loadData();

// Tự động gọi lại loadData mỗi 10 giây (10000 ms)
setInterval(loadData, 60000);

</script>

</body></html>
